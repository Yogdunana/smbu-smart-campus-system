services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smbu-campus-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-smbu}:${POSTGRES_PASSWORD:-smbu_default_pass}@db:5432/${POSTGRES_DB:-smbu_campus}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-https://campus.yogdunana.cn}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-change-me-in-production}
      - AUTH_TRUST_HOST=true
      - NODE_ENV=production
    volumes:
      - uploads:/app/public/uploads
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: smbu-campus-db
    restart: unless-stopped
    expose:
      - "5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-smbu}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-smbu_default_pass}
      - POSTGRES_DB=${POSTGRES_DB:-smbu_campus}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smbu}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  uploads:
