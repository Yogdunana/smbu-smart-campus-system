name: CD - Deploy to Server

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          timeout: 120s
          command_timeout: 30m
          script: |
            set -e

            echo "=== System Info ==="
            uname -a
            cat /etc/os-release 2>/dev/null | head -3
            echo ""

            echo "=== Checking Docker ==="
            if ! command -v docker &> /dev/null; then
              echo "Installing Docker using Aliyun mirror..."
              # Try multiple Chinese mirrors for Docker installation
              if command -v yum &> /dev/null; then
                # CentOS/RHEL
                yum install -y yum-utils
                yum-config-manager --add-repo https://mirrors.aliyun.com/docker-ce/linux/centos/docker-ce.repo
                sed -i 's+download.docker.com+mirrors.aliyun.com/docker-ce+' /etc/yum.repos.d/docker-ce.repo
                yum install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin
              elif command -v apt-get &> /dev/null; then
                # Debian/Ubuntu
                apt-get update
                apt-get install -y ca-certificates curl gnupg
                install -m 0755 -d /etc/apt/keyrings
                curl -fsSL https://mirrors.aliyun.com/docker-ce/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
                chmod a+r /etc/apt/keyrings/docker.gpg
                echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://mirrors.aliyun.com/docker-ce/linux/ubuntu $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | tee /etc/apt/sources.list.d/docker.list > /dev/null
                apt-get update
                apt-get install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin
              else
                # Fallback: try Tencent mirror
                curl -fsSL https://get.docker.com | sh -s docker --mirror Aliyun
              fi
              systemctl start docker
              systemctl enable docker
              echo "Docker installed: $(docker --version)"
            else
              echo "Docker already installed: $(docker --version)"
            fi

            # Configure Docker mirror for China
            mkdir -p /etc/docker
            cat > /etc/docker/daemon.json << 'DOCKEREOF'
            {
              "registry-mirrors": [
                "https://mirror.ccs.tencentyun.com",
                "https://docker.mirrors.ustc.edu.cn"
              ]
            }
            DOCKEREOF
            systemctl daemon-reload
            systemctl restart docker

            if docker compose version &> /dev/null; then
              echo "Docker Compose: $(docker compose version)"
            else
              echo "WARNING: Docker Compose not available"
            fi
            echo ""

            # Create project directory if not exists
            mkdir -p /opt/smbu-campus
            cd /opt/smbu-campus

            # Clone or pull latest code
            if [ -d ".git" ]; then
              echo "=== Pulling latest code ==="
              git pull origin main
            else
              echo "=== Cloning repository ==="
              git clone https://github.com/Yogdunana/smbu-smart-campus-system.git .
            fi

            # Create .env file if not exists
            if [ ! -f .env ]; then
              echo "=== Creating .env file ==="
              cat > .env << 'ENVEOF'
            DATABASE_URL=postgresql://smbu:***REDACTED***@db:5432/smbu_campus
            NEXTAUTH_URL=http://localhost:3000
            NEXTAUTH_SECRET=deploy-secret-change-in-production-$(openssl rand -hex 16)
            APP_PORT=3000
            ENVEOF
            fi

            # Stop existing containers if any
            echo "=== Stopping existing containers ==="
            docker compose down 2>/dev/null || true

            # Build and start services
            echo "=== Building and starting services ==="
            docker compose up -d --build

            # Wait for services to be healthy
            echo "=== Waiting for services to start ==="
            sleep 20

            # Check container status
            echo "=== Container Status ==="
            docker compose ps

            echo ""
            echo "=== Deployment completed successfully! ==="
            echo "Application should be available at http://$(hostname -I | awk '{print $1}'):3000"
