name: CD - Deploy to Server

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          timeout: 120s
          command_timeout: 30m
          script: |
            set -e

            echo "=== System Info ==="
            uname -a
            echo ""

            echo "=== Checking Docker ==="
            if ! command -v docker &> /dev/null; then
              echo "Installing Docker..."
              curl -fsSL https://get.docker.com | sh
              systemctl start docker
              systemctl enable docker
              echo "Docker installed successfully"
            else
              echo "Docker already installed: $(docker --version)"
            fi

            if ! docker compose version &> /dev/null; then
              echo "Installing Docker Compose plugin..."
              apt-get update && apt-get install -y docker-compose-plugin 2>/dev/null || true
            fi
            echo "Docker Compose: $(docker compose version)"
            echo ""

            # Create project directory if not exists
            mkdir -p /opt/smbu-campus
            cd /opt/smbu-campus

            # Clone or pull latest code
            if [ -d ".git" ]; then
              echo "=== Pulling latest code ==="
              git pull origin main
            else
              echo "=== Cloning repository ==="
              git clone https://github.com/Yogdunana/smbu-smart-campus-system.git .
            fi

            # Create .env file if not exists
            if [ ! -f .env ]; then
              echo "=== Creating .env file ==="
              cat > .env << 'ENVEOF'
            DATABASE_URL=postgresql://smbu:***REDACTED***@db:5432/smbu_campus
            NEXTAUTH_URL=http://localhost:3000
            NEXTAUTH_SECRET=deploy-secret-change-in-production-$(openssl rand -hex 16)
            APP_PORT=3000
            ENVEOF
            fi

            # Stop existing containers if any
            echo "=== Stopping existing containers ==="
            docker compose down 2>/dev/null || true

            # Build and start services
            echo "=== Building and starting services ==="
            docker compose up -d --build

            # Wait for services to be healthy
            echo "=== Waiting for services to start ==="
            sleep 20

            # Check container status
            echo "=== Container Status ==="
            docker compose ps

            echo ""
            echo "=== Deployment completed successfully! ==="
            echo "Application should be available at http://$(hostname -I | awk '{print $1}'):3000"
