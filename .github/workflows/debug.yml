name: Debug - Enhanced

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Check everything
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          timeout: 120s
          command_timeout: 5m
          script: |
            echo "=== Containers ==="
            docker ps -a --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

            echo ""
            echo "=== App logs (last 50) ==="
            docker logs smbu-campus-app --tail 50 2>&1

            echo ""
            echo "=== Test login page ==="
            curl -s -o /dev/null -w "Login page: HTTP %{http_code}\n" http://localhost:3000/zh/login

            echo ""
            echo "=== Test dashboard (no auth) ==="
            curl -s -o /dev/null -w "Dashboard: HTTP %{http_code}\n" http://localhost:3000/zh/dashboard

            echo ""
            echo "=== Test dashboard with follow redirect ==="
            curl -sI http://localhost:3000/zh/dashboard 2>&1 | head -10

            echo ""
            echo "=== Test root ==="
            curl -sI http://localhost:3000/ 2>&1 | head -5

            echo ""
            echo "=== .env ==="
            cat /opt/smbu-campus/.env

            echo ""
            echo "=== Check i18n files in container ==="
            docker exec smbu-campus-app ls -la /app/src/i18n/messages/ 2>&1 || echo "NOT FOUND at /app/src/i18n/messages/"

            echo ""
            echo "=== NEXTAUTH_URL check ==="
            docker exec smbu-campus-app printenv | grep -E "NEXTAUTH|AUTH|DATABASE" 2>&1

            echo ""
            echo "=== Check prisma client ==="
            docker exec smbu-campus-app ls /app/node_modules/.prisma/client/ 2>&1 | head -5 || echo "NO PRISMA CLIENT"

            echo ""
            echo "=== Test actual dashboard HTML (first 500 chars) ==="
            curl -s http://localhost:3000/zh/dashboard 2>&1 | head -c 500
